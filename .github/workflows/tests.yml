name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e '.[dev]'
      - name: Run tests
        run: python -m pytest -q
